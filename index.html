<title>かんたん家計簿</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{
    --primary:#4F9A86; --primary-l:#E6F1ED; --accent:#E0956A;
    --income:#5B8FCB; --expense:#D07A5F; --medical:#C07CA8; --invest:#6E8FC7;
    --bg:#F6F3EC; --card:#FFFDF9; --border:#E8E2D6;
    --text:#3B3A34; --sub:#7C776C; --light:#ADA79A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg); color:var(--text); font-size:15px;}
  #app{max-width:520px; margin:0 auto; padding:14px 14px calc(88px + env(safe-area-inset-bottom));}
  h2{font-size:18px; margin:4px 0 12px;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px;}
  .card.tint{background:var(--primary-l); border-color:#D6E7E0;}
  .ic{display:inline-flex; vertical-align:-2px;}
  .row{display:flex; align-items:center;} .between{justify-content:space-between;}
  .muted{color:var(--light); font-size:13px;} .sub{color:var(--sub); font-size:13px;}
  label{display:block; font-size:13px; color:var(--sub); font-weight:600; margin:12px 0 6px;}
  input,select,textarea{width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; font-size:16px; background:#fff; color:var(--text); font-family:inherit;}
  textarea{height:70px; resize:vertical;}
  button{font-family:inherit; cursor:pointer;}
  .btn{display:block; width:100%; background:var(--primary); color:#fff; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; margin-top:6px;}
  .btn.ghost{background:transparent; color:var(--primary); border:1px solid var(--primary);}
  .btn.sm{padding:10px; font-size:14px;}
  .seg{display:flex; background:var(--primary-l); border-radius:12px; padding:4px; margin:4px 0;}
  .seg button{flex:1; border:none; background:transparent; padding:10px; border-radius:9px; color:var(--sub); font-size:14px;}
  .seg button.on{background:var(--primary); color:#fff; font-weight:700;}
  .seg.exp button.on{background:var(--expense);} .seg.inc button.on{background:var(--income);}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{padding:8px 14px; border:1px solid var(--border); border-radius:999px; background:#fff; color:var(--sub); font-size:14px;}
  .chip.on{background:var(--primary); color:#fff; border-color:var(--primary);}
  .ledgers{display:flex; gap:8px; overflow-x:auto; padding:6px 0 10px;}
  .ltab{white-space:nowrap; padding:8px 15px; border-radius:999px; border:1.5px solid var(--primary); background:#fff; color:var(--text); font-size:14px;}
  .ltab.on{background:var(--primary); color:#fff; font-weight:700;}
  .txrow{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border);}
  .txrow:last-child{border-bottom:none;}
  .txrow.tap{cursor:pointer;} .txrow.tap:active{background:var(--primary-l);}
  .editbar{background:#FDF3E8; border:1px solid var(--accent); color:#8a5a2b; border-radius:12px; padding:10px 12px; margin-bottom:10px; font-size:13px; display:flex; justify-content:space-between; align-items:center;}
  .editbar button{background:none; border:none; color:var(--expense); font-weight:700; font-size:13px;}
  .txcat{font-weight:600;} .txmeta{font-size:12px; color:var(--light); margin-top:2px;}
  .amt{font-weight:700; font-size:16px;}
  .bar{height:10px; background:var(--primary-l); border-radius:5px; overflow:hidden;}
  .bar>span{display:block; height:100%; background:var(--expense); border-radius:5px;}
  .del{color:var(--expense); font-size:13px; background:none; border:none; padding:4px 8px;}
  .stat{width:33.33%; padding:6px 0;}
  .stat .l{font-size:12px; color:var(--sub);} .stat .v{font-size:16px; font-weight:800; margin-top:2px;}
  .toggle-row{display:flex; justify-content:space-between; align-items:center; padding:7px 0;}
  .switch{position:relative; width:46px; height:28px; flex:none;}
  .switch input{display:none;}
  .switch .track{position:absolute; inset:0; background:#ccc; border-radius:999px; transition:.2s;}
  .switch .track:before{content:""; position:absolute; width:22px; height:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s;}
  .switch input:checked + .track{background:var(--primary);}
  .switch input:checked + .track:before{transform:translateX(18px);}
  .badge{display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700; color:#fff;}
  .wdrow{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px;}
  .wd{text-align:center; font-size:12px; color:var(--sub); font-weight:600; padding:2px 0;}
  .wd.sun{color:var(--expense);} .wd.sat{color:var(--income);}
  .calwrap{background:var(--border); border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  .cal{display:grid; grid-template-columns:repeat(7,1fr); gap:1px;}
  .cell{background:#fff; min-height:56px; padding:3px 1px 2px; text-align:center; border:none;}
  .cell.sel{background:var(--primary-l);}
  .cell .d{font-size:13px;} .cell .d.sun{color:var(--expense);} .cell .d.sat{color:var(--income);}
  .cell .today{display:inline-block; min-width:20px; line-height:20px; background:var(--primary); color:#fff; border-radius:10px; font-weight:800;}
  .cell .ci{font-size:9px; color:var(--income); line-height:1.15; overflow:hidden;}
  .cell .ce{font-size:9px; color:var(--expense); line-height:1.15; overflow:hidden;}
  .mnav{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .mnav button{background:none; border:none; font-size:26px; color:var(--primary); padding:2px 16px;}
  .mtitle{font-size:20px; font-weight:800;}
  .datehead{font-size:13px; font-weight:700; color:var(--sub); margin:14px 0 4px;}
  .center{text-align:center;} .mt{margin-top:12px;}
  .legend{display:flex; justify-content:center; gap:18px; margin-top:8px; font-size:12px;}
  .catman{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px;}
  .catpill{display:inline-flex; align-items:center; gap:6px; padding:6px 8px 6px 12px; border:1px solid var(--border); border-radius:999px; font-size:14px;}
  .catpill button{background:none; border:none; color:var(--light); font-size:15px; line-height:1; padding:0 2px;}
  .ocrbox{border:1px dashed var(--primary); border-radius:12px; padding:12px; text-align:center; background:var(--primary-l);}
  .ocrbox input{display:none;} .ocrlabel{color:var(--primary); font-weight:700;}
  nav{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); display:flex; max-width:520px; margin:0 auto;
    padding-top:6px; padding-bottom:calc(6px + env(safe-area-inset-bottom)); padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right);
    box-shadow:0 -2px 10px rgba(0,0,0,.03);}
  nav button{flex:1 1 0; min-width:0; background:none; border:none; color:var(--light); font-size:clamp(9px,2.7vw,11px);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:6px 2px; overflow:hidden; white-space:nowrap;}
  nav button.on{color:var(--primary); font-weight:700;}
  nav svg{width:clamp(20px,6vw,24px); height:clamp(20px,6vw,24px);}
  /* modal & calculator */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; padding:20px; z-index:50;}
  .modal{background:#fff; border-radius:16px; padding:18px; width:100%; max-width:340px;}
  .modal h3{margin:0 0 10px; font-size:16px;}
  .modal-actions{display:flex; gap:8px; margin-top:12px;}
  .modal-actions button{flex:1; padding:12px; border-radius:12px; border:none; font-weight:700; font-size:15px;}
  .modal-actions .ok{background:var(--primary); color:#fff;} .modal-actions .cancel{background:var(--bg); color:var(--sub);}
  .calc-disp{background:var(--bg); border-radius:12px; padding:14px; text-align:right; font-size:24px; font-weight:800; margin-bottom:10px; min-height:28px; word-break:break-all;}
  .calc-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .calc-grid button{padding:15px 0; border:1px solid var(--border); border-radius:12px; background:#fff; font-size:18px; font-weight:700;}
  .calc-grid button.op{background:var(--primary-l); color:var(--primary);}
  .calc-grid button.eq{background:var(--primary); color:#fff;}
  .flash{background:var(--primary); color:#fff; border-radius:12px; padding:10px 14px; font-weight:700; text-align:center; margin-bottom:12px;}
  #toast{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:100;}
  #toast .toast{background:rgba(35,44,40,.94); color:#fff; border-radius:16px; padding:16px 22px; font-weight:700; font-size:15px; max-width:78%; text-align:center; display:flex; align-items:center; gap:9px; box-shadow:0 8px 30px rgba(0,0,0,.25); opacity:0; transform:scale(.9); transition:opacity .18s ease, transform .18s ease;}
  #toast .toast.show{opacity:1; transform:scale(1);}
  #toast .toast .tk{width:26px; height:26px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; flex:none;}
  #toast .toast .tk svg{width:15px; height:15px;}
  .calcbtn{width:52px; flex:none; border:1px solid var(--border); border-radius:12px; background:#fff; font-size:20px;}
  .fpgroup{border-top:1px solid var(--border); margin-top:10px; padding-top:10px;}
  .stackbar{display:flex; height:30px; border-radius:8px; overflow:hidden; margin-bottom:10px; background:var(--bg);}
  .stackseg{height:100%; cursor:pointer; transition:opacity .15s; min-width:2px;}
  .stackseg:active{opacity:.55;}
  .sliceinfo{font-size:13px; color:var(--sub); min-height:22px; display:flex; align-items:center; gap:6px; opacity:.85;}
  .slicelegend{display:flex; flex-wrap:wrap; gap:8px 12px; margin-top:12px;}
  .slicechip{font-size:12px; color:var(--sub); display:inline-flex; align-items:center; gap:5px; cursor:pointer;}

// NISA枠の使用状況（買付＝簿価ベース。売却分の簿価は生涯枠から差し引き＝翌年復活を近似）
function nisaUsage(){ const yr=new Date().getFullYear(); let gY=0,tY=0,buyLife=0,soldBook=0;
  for(const i of ledgerInv()){ const acc=i.account||""; if(acc.indexOf("NISA")<0&&acc.indexOf("ニーサ")<0)continue;
    const isGrowth=acc.indexOf("成長")>=0; const isTsumi=acc.indexOf("つみたて")>=0||acc.indexOf("積立")>=0;
    const y=+(String(i.tradedAt||"").slice(0,4));
    if(i.action==="buy"){ buyLife+=i.amount; if(y===yr){ if(isGrowth)gY+=i.amount; else if(isTsumi)tY+=i.amount; } }
    else if(i.action==="sell"){ const bk=i.kind==="stock"?(i.amount-(i.realizedPL||0)):i.amount; soldBook+=Math.max(0,bk); } }
  const usedLife=Math.max(0,buyLife-soldBook), thisYear=gY+tY;
  const remainingLife=Math.max(0,NISA_LIFETIME-usedLife);
  const availableNow=Math.max(0,Math.min(3600000-thisYear,remainingLife));
  return {growthYear:gY,tsumiYear:tY,usedLife,remainingLife,availableNow,thisYear,hasNisa:buyLife>0,year:yr}; }

/* ---------- utils ---------- */
function yen(n){ return "¥"+Math.round(Number(n)||0).toLocaleString("ja-JP"); }
function pad(n){ return String(n).padStart(2,"0"); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function nowLocal(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":"+pad(d.getMinutes()); }
function monthStr(){ return ui.month.y+"-"+pad(ui.month.m+1); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function curLedger(){ return data.ledgers.find(l=>l.id===data.currentLedgerId)||data.ledgers[0]; }
function ledgerTx(){ return data.transactions.filter(t=>t.ledgerId===data.currentLedgerId); }
function ledgerInv(){ return data.investments.filter(i=>i.ledgerId===data.currentLedgerId); }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():""; }
function intval(id){ return parseInt((val(id)||"").replace(/[,\s]/g,""),10)||0; }
function chk(id){ const e=document.getElementById(id); return !!(e&&e.checked); }
function monthlySummary(m){ let i=0,e=0; for(const t of ledgerTx()){ if((t.date||"").slice(0,7)===m){ if(t.type==="income")i+=t.amount; else e+=t.amount; } } return {income:i,expense:e,balance:i-e}; }
function balanceBefore(ms){ let n=0; for(const t of ledgerTx()){ if((t.date||"")<ms) n+=(t.type==="income"?t.amount:-t.amount); } return n; }
function dailyTotals(m){ const map={}; for(const t of ledgerTx()){ const d=t.date||""; if(d.slice(0,7)!==m)continue; if(!map[d])map[d]={income:0,expense:0}; if(t.type==="income")map[d].income+=t.amount; else map[d].expense+=t.amount; } return map; }
function last12Expense(){ const s=new Date(now.getFullYear(),now.getMonth()-11,1); let sum=0; for(const t of ledgerTx()){ if(t.type!=="expense")continue; if(new Date(t.date)>=s) sum+=t.amount; } return sum; }
function monthsUntil(dl){ if(!dl)return null; const d=new Date(dl); const mo=(d.getFullYear()-now.getFullYear())*12+(d.getMonth()-now.getMonth()); return mo>0?mo:null; }
function planSet(){ const id=data.currentLedgerId; if(!data.planSettings[id]) data.planSettings[id]={startingAssets:0,monthly:0,ret:3,years:20,fireExpense:0}; const p=data.planSettings[id]; if(p.startingAssets===undefined)p.startingAssets=0; return p; }
function simulate(cur,mon,pct,yrs){ const r=(pct||0)/100/12; const pts=[]; let bal=cur||0; yrs=Math.max(1,Math.min(60,yrs||1)); for(let y=1;y<=yrs;y++){ for(let k=0;k<12;k++) bal=bal*(1+r)+(mon||0); pts.push({year:y,value:Math.round(bal)}); } return pts; }
function yearsToFire(cur,mon,pct,target){ if(target<=0)return null; const r=(pct||0)/100/12; let bal=cur||0; if(bal>=target)return 0; for(let m=1;m<=720;m++){ bal=bal*(1+r)+(mon||0); if(bal>=target)return Math.ceil(m/12);} return null; }
/* 家計簿の入力から自動計算する資産まわり */
function cumulativeNet(){ let n=0; for(const t of ledgerTx()) n+=(t.type==="income"?t.amount:-t.amount); return n; } // 収支の累計＝現金の増減
function cashAssets(){ return (planSet().startingAssets||0)+cumulativeNet(); } // 貯金（現金）＝初期資産＋収支累計
function investmentCost(){ let s=0; for(const i of ledgerInv()){ if(i.action==="buy")s+=i.amount; else if(i.action==="sell")s-=i.amount; } return s; } // 取得ベースの投資残高
function totalAssets(){ return cashAssets()+investmentCost(); }
function avgMonthlyExpense(){ const ms=new Set(); let s=0; for(const t of ledgerTx()){ if(t.type==="expense"){ ms.add((t.date||"").slice(0,7)); s+=t.amount; } } return ms.size?Math.round(s/ms.size):0; }
function avgMonthlySavings(){ const ms=new Set(); let n=0; for(const t of ledgerTx()){ ms.add((t.date||"").slice(0,7)); n+=(t.type==="income"?t.amount:-t.amount); } return ms.size?Math.round(n/ms.size):0; }
function yearlyNetWorth(){ const ys=new Set(); for(const t of ledgerTx()) if(t.date)ys.add(+t.date.slice(0,4)); for(const i of ledgerInv()) if(i.tradedAt)ys.add(+i.tradedAt.slice(0,4));
  if(!ys.size) return []; const arr=[...ys].sort((a,b)=>a-b); const out=[];
  for(let y=arr[0];y<=arr[arr.length-1];y++){ const cut=y+"-12-31"; let cash=(planSet().startingAssets||0);
    for(const t of ledgerTx()) if((t.date||"")<=cut) cash+=(t.type==="income"?t.amount:-t.amount);
    let inv=0; for(const i of ledgerInv()) if((i.tradedAt||"").slice(0,10)<=cut){ if(i.action==="buy")inv+=i.amount; else if(i.action==="sell")inv-=i.amount; }
    out.push({year:y,cash,inv,net:cash+inv}); } return out; }

/* ---------- 受渡金額・実現損益 ---------- */
function invAmount(){ if(ui.invKind==="fund") return intval("i_amount");
  const q=parseFloat(val("i_qty"))||0,p=parseFloat(val("i_price"))||0,f=parseInt(val("i_fee"),10)||0;
  if(ui.invAction==="dividend")return p; const base=q*p; return ui.invAction==="buy"?base+f:base-f; }
function avgCost(symbol,name){ let q=0,c=0; for(const i of data.investments){ if(i.ledgerId!==data.currentLedgerId||i.kind!=="stock")continue; if((i.symbol||"")!==symbol||(i.name||"")!==name)continue; if(i.action==="buy"){q+=i.quantity;c+=i.amount;} } return q>0?c/q:0; }
function estRealized(){ if(ui.invKind!=="stock"||ui.invAction!=="sell")return 0; const q=parseFloat(val("i_qty"))||0; return Math.round(invAmount()-avgCost(val("i_symbol"),val("i_name"))*q); }

function pieSVG(items){ const total=items.reduce((s,i)=>s+i.value,0);
  if(total<=0) return '<div class="muted center">この月のデータがありません</div>';
  const cx=80,cy=80,r=76; let ang=-Math.PI/2; let paths="";

  else{ for(const it of items){ const frac=it.value/total; const a2=ang+frac*2*Math.PI;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2); const large=frac>0.5?1:0;
    paths+='<path d="M'+cx+' '+cy+' L'+x1.toFixed(2)+' '+y1.toFixed(2)+' A'+r+' '+r+' 0 '+large+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+' Z" fill="'+it.color+'"/>'; ang=a2; } }

  return '<div class="row" style="gap:12px;flex-wrap:wrap;justify-content:center"><svg viewBox="0 0 160 160" width="150" height="150">'+paths+'</svg><div style="flex:1;min-width:170px">'+legend+'</div></div>';
}
function barSVG(items){ if(!items.length) return '<div class="muted center">データがありません</div>';
  const n=items.length, W=Math.max(300,n*40), H=168, top=12, bottom=132;
  const posMax=Math.max(0,...items.map(i=>i.value)), negMin=Math.min(0,...items.map(i=>i.value));
  const range=(posMax-negMin)||1, scale=(bottom-top)/range, zeroY=top+posMax*scale, step=(W-20)/n, bw=Math.min(30,step-8);
  let bars="",labels="";
  const zero='<line x1="8" y1="'+zeroY.toFixed(1)+'" x2="'+(W-8)+'" y2="'+zeroY.toFixed(1)+'" stroke="#e0e0e0"/>';
  items.forEach((it,i)=>{ const x=10+step*i+(step-bw)/2, bh=Math.abs(it.value)*scale, y=it.value>=0?zeroY-bh:zeroY, col=it.value>=0?"var(--primary)":"var(--expense)";
    bars+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(1,bh).toFixed(1)+'" rx="3" fill="'+col+'"/>';
    labels+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-6)+'" font-size="9" fill="#999" text-anchor="middle">'+esc(it.label)+'</text>'; });
  return '<div style="overflow-x:auto"><svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">'+zero+bars+labels+'</svg></div>';
}

/* ---------- 医療費控除CSV ---------- */
function csvEscape(v){ const s=(v==null?"":String(v)); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function exportMedicalCsv(year){ const rows=ledgerTx().filter(t=>(t.medical||t.transport)&&(t.date||"").slice(0,4)===String(year)).sort((a,b)=>a.date<b.date?-1:1);
  if(!rows.length){ alert(year+"年の医療費・通院交通費の記録がありません。"); return; }
  const head=["日付","医療を受けた人","病院・薬局などの名称（支払先）","医療費の区分","支払った医療費の額","うち補填される金額","メモ"];
  const lines=[head.map(csvEscape).join(",")]; let total=0,reimb=0;
  for(const r of rows){ total+=r.amount; reimb+=(r.reimbursed||0); lines.push([r.date,r.person||"",r.payee||"",r.transport?"その他（通院交通費）":"診療・治療",r.amount,r.reimbursed||0,r.memo||""].map(csvEscape).join(",")); }
  lines.push(""); lines.push(["","","","合計",total,reimb,"控除対象概算: "+(total-reimb)+"円"].map(csvEscape).join(","));
  const blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8;"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="医療費控除_"+curLedger().name+"_"+year+".csv"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }

  }
  const cm={}; for(const t of ledgerTx()){ if((t.date||"").slice(0,7)===m&&t.type==="expense") cm[t.category||"未分類"]=(cm[t.category||"未分類"]||0)+t.amount; }
  const cats=Object.entries(cm).sort((a,b)=>b[1]-a[1]);
  h+='<div class="datehead">支出の内訳</div><div class="card">';
  if(cats.length){ const total=cats.reduce((s,c)=>s+c[1],0);
    window._slices=cats.map((c,i)=>({label:c[0],value:c[1],pct:Math.round(c[1]/total*100),color:PALETTE[i%PALETTE.length]}));
    h+='<div class="stackbar">'+window._slices.map((s,i)=>'<div class="stackseg" style="width:'+(s.value/total*100)+'%;background:'+s.color+'" onclick="showSlice('+i+')" title="'+esc(s.label)+' '+yen(s.value)+'"></div>').join("")+'</div>';
    h+='<div id="slice_info" class="sliceinfo">バーやカテゴリ名をタップすると内訳が出ます（合計 '+yen(total)+'）</div>';
    h+='<div class="slicelegend">'+window._slices.map((s,i)=>'<span class="slicechip" onclick="showSlice('+i+')"><span class="dot" style="background:'+s.color+'"></span>'+esc(s.label)+'</span>').join("")+'</div>';
  } else h+='<div class="muted center">今月の支出はまだありません</div>';
  h+='</div>';
  return h;
}

function invRow(r){ const aL=r.kind==="fund"?{buy:"積立",sell:"解約",dividend:"分配"}[r.action]:{buy:"買付",sell:"売却",dividend:"配当"}[r.action];

  return '<div class="txrow tap" onclick="editInv('+r.id+')"><div><div class="txcat"><span class="badge" style="background:'+col+'">'+aL+'</span> '+esc(r.name||r.symbol)+(r.kind==="fund"?' <span class="muted">投信</span>':'')+style+'</div><div class="txmeta">'+(r.tradedAt||"").replace("T"," ")+(r.account?" ・ "+r.account:"")+(det?" ・ "+det:"")+(r.realizedPL!=null?" ・ 実現損益 "+(r.realizedPL>=0?"+":"")+yen(r.realizedPL):"")+'</div></div><div class="row" style="gap:6px"><span class="amt" style="color:'+col+'">'+yen(r.amount)+'</span><button class="del" onclick="event.stopPropagation();deleteInv('+r.id+')">削除</button></div></div>'; }
function viewInvest(){ const K=ui.invKind,A=ui.invAction; const invs=ledgerInv().sort((a,b)=>(a.tradedAt<b.tradedAt?1:a.tradedAt>b.tradedAt?-1:b.id-a.id));

  h+='<div class="card"><div class="seg"><button class="'+(K==="stock"?"on":"")+'" onclick="setInvKind(\'stock\')">個別株</button><button class="'+(K==="fund"?"on":"")+'" onclick="setInvKind(\'fund\')">投信・積立</button></div>';
  const aLab=K==="stock"?{buy:"買付",sell:"売却",dividend:"配当"}:{buy:"積立/購入",sell:"解約",dividend:"分配金"};
  h+='<div class="seg" style="margin-top:8px"><button class="'+(A==="buy"?"on":"")+'" onclick="setInvAction(\'buy\')">'+aLab.buy+'</button><button class="'+(A==="sell"?"on":"")+'" onclick="setInvAction(\'sell\')">'+aLab.sell+'</button><button class="'+(A==="dividend"?"on":"")+'" onclick="setInvAction(\'dividend\')">'+aLab.dividend+'</button></div>';
  if(K==="stock"){ h+='<div class="row" style="gap:10px"><div style="flex:1"><label>銘柄コード</label><input id="i_symbol" value="'+(e?esc(e.symbol):"")+'" placeholder="例: 7203"></div><div style="flex:1.4"><label>銘柄名</label><input id="i_name" value="'+(e?esc(e.name):"")+'" placeholder="例: トヨタ自動車"></div></div>';
    if(A==="dividend") h+='<label>配当の額（円）</label><input id="i_price" type="number" inputmode="numeric" value="'+(e?e.price:"")+'" oninput="calcInv()"><input type="hidden" id="i_qty" value="0"><input type="hidden" id="i_fee" value="0">';
    else h+='<div class="row" style="gap:10px"><div style="flex:1"><label>数量</label><input id="i_qty" type="number" inputmode="decimal" value="'+(e?e.quantity:"")+'" oninput="calcInv()"></div><div style="flex:1"><label>単価</label><input id="i_price" type="number" inputmode="decimal" value="'+(e?e.price:"")+'" oninput="calcInv()"></div><div style="flex:1"><label>手数料</label><input id="i_fee" type="number" inputmode="numeric" value="'+(e?e.fee:"")+'" oninput="calcInv()"></div></div>';
  } else { h+='<label>ファンド名</label><input id="i_name" value="'+(e?esc(e.name):"")+'" placeholder="例: 楽天・資産づくりファンド（らくらく投資）"><label>'+(A==="buy"?"積立/購入額":A==="sell"?"解約額（受取）":"分配金")+'（円）</label><input id="i_amount" type="number" inputmode="numeric" value="'+(e?e.amount:"")+'" oninput="calcInv()"><input type="hidden" id="i_symbol" value="'+(e?esc(e.symbol):"")+'"><input type="hidden" id="i_qty" value="0"><input type="hidden" id="i_price" value="0"><input type="hidden" id="i_fee" value="0">'; }
  h+='<label>口座</label><select id="i_account">'+accts.map(a=>'<option'+((e&&e.account===a)?' selected':'')+'>'+a+'</option>').join("")+'</select>';
  if(A==="buy") h+='<label>買い方</label><select id="i_style">'+styles.map(s=>'<option'+((e&&e.style===s)?' selected':'')+'>'+s+'</option>').join("")+'</select>';
  h+='<label>取引日時</label><input id="i_at" type="datetime-local" value="'+(e?esc(e.tradedAt):nowLocal())+'"><label>メモ（任意）</label><textarea id="i_memo">'+(e?esc(e.memo):"")+'</textarea>';
  h+='<div class="row between mt"><span class="sub">'+(K==="stock"?"受渡金額（概算）":"金額")+'</span><span id="i_amt" style="font-weight:800;font-size:18px;color:var(--invest)">¥0</span></div>';
  if(K==="stock"&&A==="sell") h+='<div class="row between"><span class="sub">実現損益（概算）</span><span id="i_pl" style="font-weight:800">—</span></div>';
  h+='<button class="btn mt" onclick="saveInv()">'+(e?"更新する":"この取引を記録")+'</button></div>';
  // NISA枠の使用状況
  const nu=nisaUsage();
  if(nu.hasNisa){ h+='<div class="datehead">'+ci("target",15,"var(--invest)")+' NISA投資枠の使用状況（'+nu.year+'年）</div><div class="card"><div class="row" style="justify-content:space-around">'
    +ringSVG(nu.growthYear,NISA_GROWTH_YEAR,"成長投資枠",'var(--invest)')+ringSVG(nu.tsumiYear,NISA_TSUMI_YEAR,"つみたて枠",'var(--accent)')+'</div>'
    +'<div class="row between" style="margin:12px 0 4px"><b>今年あと投資できる額</b><b class="bignum" style="font-size:20px;color:var(--invest)">'+yen(nu.availableNow)+'</b></div>'
    +'<div class="muted">年間360万（成長240＋つみたて120）と、生涯の残りのうち<b>少ない方</b>。今年の買付 '+yen(nu.thisYear)+'。'+(nu.availableNow<(3600000-nu.thisYear)?'<span style="color:var(--expense)">※生涯枠の残りで頭打ちになっています</span>':'')+'</div>'
    +'<div class="sub" style="margin-top:12px">生涯投資枠（1800万円・簿価）</div><div class="bar" style="height:12px"><span style="width:'+Math.min(100,nu.usedLife/NISA_LIFETIME*100)+'%;background:var(--primary)"></span></div><div class="muted" style="margin-top:4px">使用 '+yen(nu.usedLife)+' ／ 残り '+yen(nu.remainingLife)+'（'+Math.round(nu.usedLife/NISA_LIFETIME*100)+'%）</div>'
    +'<div class="muted mt">※簿価ベースの概算です。売却分は生涯枠から差し引いています（実際の枠復活は翌年から。年間360万の上限は変わりません）。成長投資枠は生涯で最大1200万。</div></div>'; }
  // 個別株サマリ
  const stocks=invs.filter(i=>i.kind==="stock"); const pf={}; let realized=0;
  for(const i of stocks){ const k=(i.symbol||"")+"|"+(i.name||""); if(!pf[k])pf[k]={name:i.name||i.symbol,net:0,buy:0,div:0}; if(i.action==="buy"){pf[k].net+=i.quantity;pf[k].buy+=i.amount;} else if(i.action==="sell"){pf[k].net-=i.quantity;realized+=(i.realizedPL||0);} else pf[k].div+=i.amount; }
  if(Object.keys(pf).length){ h+='<div class="datehead">個別株の保有・実現損益</div><div class="card">'+Object.values(pf).map(p=>'<div class="txrow"><div><div class="txcat">'+esc(p.name)+'</div><div class="txmeta">保有 '+p.net.toLocaleString("ja-JP")+' 口 ・ 取得計 '+yen(p.buy)+(p.div?' ・ 配当 '+yen(p.div):'')+'</div></div></div>').join("")
    +'<div class="row between" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><b>実現損益の合計</b><b style="color:'+(realized>=0?"var(--income)":"var(--expense)")+'">'+(realized>=0?"+":"")+yen(realized)+'</b></div></div>'; }
  // 投信サマリ
  const funds=invs.filter(i=>i.kind==="fund"); const fm={};
  for(const i of funds){ const k=i.name; if(!fm[k])fm[k]={name:i.name,inv:0,red:0,dist:0}; if(i.action==="buy")fm[k].inv+=i.amount; else if(i.action==="sell")fm[k].red+=i.amount; else fm[k].dist+=i.amount; }
  if(Object.keys(fm).length){ h+='<div class="datehead">投信・積立の状況</div><div class="card">'+Object.values(fm).map(f=>'<div class="txrow"><div><div class="txcat">'+esc(f.name)+'</div><div class="txmeta">積立累計 '+yen(f.inv)+(f.red?' ・ 解約 '+yen(f.red):'')+(f.dist?' ・ 分配 '+yen(f.dist):'')+'</div></div><div class="amt" style="color:var(--invest)">'+yen(f.inv-f.red)+'</div></div>').join("")+'<div class="muted mt">※投信・積立はリアルタイム株価を取得しないため、投資額の記録が中心です。</div></div>'; }
  h+='<div class="datehead">取引履歴</div><div class="card">'+(invs.length?invs.map(invRow).join(""):'<div class="muted center">取引を記録しましょう</div>')+'</div>';
  return h;
}

/* ---------- グラフ ---------- */
function viewGraph(){ const m=monthStr(); const inc={},exp={};
  for(const t of ledgerTx()){ if((t.date||"").slice(0,7)!==m)continue; const c=t.category||"未分類"; if(t.type==="income")inc[c]=(inc[c]||0)+t.amount; else exp[c]=(exp[c]||0)+t.amount; }
  const toItems=o=>Object.entries(o).sort((a,b)=>b[1]-a[1]).map((e,i)=>({label:e[0],value:e[1],color:PALETTE[i%PALETTE.length]}));
  const bars=[]; for(let k=11;k>=0;k--){ const d=new Date(ui.month.y,ui.month.m-k,1); const ms=d.getFullYear()+"-"+pad(d.getMonth()+1); let ii=0,ee=0; for(const t of ledgerTx()){ if((t.date||"").slice(0,7)===ms){ if(t.type==="income")ii+=t.amount; else ee+=t.amount; } } bars.push({label:(d.getMonth()+1)+"月",value:ii-ee}); }
  let h=ledgerBar()+monthNav();
  h+='<div class="datehead">支出の割合（'+(ui.month.m+1)+'月）</div><div class="card">'+pieSVG(toItems(exp))+'</div>';
  h+='<div class="datehead">収入の割合（'+(ui.month.m+1)+'月）</div><div class="card">'+pieSVG(toItems(inc))+'</div>';
  h+='<div class="datehead">毎月の貯金（収支）— 直近12ヶ月</div><div class="card">'+barSVG(bars)+'<div class="muted center mt">緑＝黒字（貯金） ／ 赤＝赤字</div></div>';
  // 支払い方法・負担先（今月・支出）
  const mExp={},pExp={};
  for(const t of ledgerTx()){ if(t.type!=="expense"||(t.date||"").slice(0,7)!==m)continue; const mid=t.methodId||0; mExp[mid]=(mExp[mid]||0)+t.amount; const pid=methodPayerId(t.methodId)||0; pExp[pid]=(pExp[pid]||0)+t.amount; }
  if(Object.keys(mExp).length){
    const payerRows=data.payers.map(p=>[esc(p.name),pExp[p.id]||0]).filter(r=>r[1]>0); if(pExp[0])payerRows.push(["未設定",pExp[0]]); payerRows.sort((a,b)=>b[1]-a[1]);
    h+='<div class="datehead">口座負担（今月・誰の口座から出るか）</div><div class="card">'+(payerRows.length?payerRows.map(r=>'<div class="row between" style="padding:6px 0"><span>'+r[0]+'</span><b>'+yen(r[1])+'</b></div>').join(""):'<div class="muted center">データなし</div>')+'</div>';
    const mItems=Object.entries(mExp).map(([mid,v],i)=>{ const id=+mid; const nm=id===0?"未設定":(methodById(id)?methodById(id).name:"不明"); return {label:nm,value:v,color:PALETTE[i%PALETTE.length],mid:id}; }).sort((a,b)=>b.value-a.value);
    h+='<div class="datehead">支払い方法別の利用額（今月＝翌月の引き落とし目安）</div><div class="card">'+pieSVG(mItems.map(it=>({label:it.label,value:it.value,color:it.color})))
      +'<div class="muted center mt">タップでそのカードの明細</div>'+mItems.map(it=>'<div class="txrow tap" onclick="showMethodDetail('+it.mid+')"><span style="flex:1">'+esc(it.label)+'</span><b>'+yen(it.value)+'</b></div>').join("")+'</div>';
    if(ui.methodDetailId!=null){ const dm=ui.methodDetailId; const nm=dm===0?"未設定":(methodById(dm)?methodById(dm).name:"不明");
      const list=ledgerTx().filter(t=>t.type==="expense"&&(t.date||"").slice(0,7)===m&&((t.methodId||0)===dm)).sort((a,b)=>a.date<b.date?1:-1);
      h+='<div class="datehead">'+esc(nm)+' の明細（'+(ui.month.m+1)+'月）</div><div class="card">'+(list.length?list.map(txRow).join(""):'<div class="muted center">なし</div>')+'</div>'; }
  }
  return h;
}

/* ---------- マネープラン（FP・家計簿から自動計算） ---------- */

  const cash=cashAssets(), invCost=investmentCost(), total=totalAssets();
  const suggestMon = ps.monthly || Math.max(0, avgMonthlySavings());
  let h='<h2>マネープラン（'+esc(curLedger().name)+'）</h2>';

  // 現在の資産（自動）
  h+='<div class="card tint"><div class="sub">今の総資産（家計簿から自動計算）</div><div class="bignum">'+yen(total)+'</div>'
    +'<div class="muted mt">内訳：貯金（現金）'+yen(cash)+' ＋ 投資（取得額）'+yen(invCost)+'</div>'
    +'<div class="muted">貯金＝初期資産＋これまでの収支の累計。正確にするには下の「初期資産」を入れてください。</div></div>';

  // ① シミュレーション
  h+='<div class="datehead">① 将来の資産シミュレーション</div><div class="card">'
    +'<div class="row" style="gap:10px"><div style="flex:1"><label>初期資産（記録開始前）</label><input id="p_start" type="number" inputmode="numeric" value="'+(ps.startingAssets||0)+'"></div><div style="flex:1"><label>毎月の積立</label><input id="p_mon" type="number" inputmode="numeric" value="'+suggestMon+'"></div></div>'
    +'<div class="row" style="gap:10px"><div style="flex:1"><label>想定利回り（年%）</label><input id="p_ret" type="number" inputmode="decimal" value="'+ps.ret+'"></div><div style="flex:1"><label>期間（年）</label><input id="p_yrs" type="number" inputmode="numeric" value="'+ps.years+'"></div></div>'
    +'<button class="btn sm mt" onclick="updateStarting()">更新</button>';
  const sim=simulate(total,suggestMon,ps.ret,ps.years);
  if(sim.length){ const shown=sim.length>12?sim.filter((p,i)=>i%Math.ceil(sim.length/12)===0||i===sim.length-1):sim; h+='<div class="mt">'+barSVG(shown.map(p=>({label:p.year+"y",value:p.value})))+'</div>';
    const last=sim[sim.length-1], invested=total+suggestMon*12*ps.years; h+='<div class="sub mt">'+ps.years+'年後の予想資産：<b style="color:var(--primary)">'+yen(last.value)+'</b><br>（今の資産＋積立元本 '+yen(invested)+' ＋ 運用益 '+yen(last.value-invested)+'）</div>'; }
  h+='<div class="muted mt">毎月の積立は、これまでの平均貯金額を初期値にしています（変更可）。</div></div>';

  // ② 目標（欲しいもの / ライフプラン）
  const goals=data.goals.filter(g=>g.ledgerId===data.currentLedgerId);
  const eg=ui.editGoalId?ui.editGoal:null;
  h+='<div class="datehead">② 目標・プラン</div><div class="card">';
  if(eg) h+='<div class="editbar"><span>目標を編集中です</span><button onclick="cancelEditGoal()">やめる</button></div>';
  h+='<div class="seg"><button class="'+(ui.goalType==="want"?"on":"")+'" onclick="setGoalType(\'want\')">目標</button><button class="'+(ui.goalType==="life"?"on":"")+'" onclick="setGoalType(\'life\')">ライフプラン</button></div>'
    +'<label>'+(ui.goalType==="want"?"目標名（例: 旅行 / 家電 / 貯金）":"予定（例: 引っ越し / 車の購入 / 住宅頭金）")+'</label><input id="g_name" value="'+(eg?esc(eg.name):"")+'" placeholder="'+(ui.goalType==="want"?"目標":"大きな予定")+'">'

  const renderGoal=g=>{ const p=g.target>0?Math.min(100,g.current/g.target*100):0, ml=monthsUntil(g.deadline), need=ml&&g.target>g.current?Math.ceil((g.target-g.current)/ml):null;

  const wants=goals.filter(g=>(g.type||"want")==="want"), lifes=goals.filter(g=>g.type==="life");
  h+='<div class="datehead">'+ci("target",15,"var(--primary)")+' 目標</div><div class="card">'+(wants.length?wants.map(renderGoal).join(""):'<div class="muted center">目標を追加しましょう</div>')+'</div>';

  // ③ 予備資金チェック
  const ame=avgMonthlyExpense(); const months= ame>0? cash/ame : null;
  h+='<div class="datehead">③ 予備資金（生活防衛資金）チェック</div><div class="card">';
  if(months==null){ h+='<div class="muted center">支出を記録すると、貯金が生活費の何ヶ月分か表示します</div>'; }

    h+='<div class="row between"><span>貯金（現金）は生活費の</span><span class="bignum '+cls+'">'+months.toFixed(1)+'ヶ月分</span></div><div class="sub mt">月の平均支出 '+yen(ame)+' ／ 貯金 '+yen(cash)+'</div><div class="'+cls+'" style="font-weight:700;margin-top:6px">'+msg+'</div>'; }
  h+='</div>';

  // ④ FIRE
  const annual=ps.fireExpense||ame*12; const fireTarget=annual*25, ytf=yearsToFire(total,suggestMon,ps.ret,fireTarget);
  h+='<div class="datehead">④ FIRE（早期リタイア）計算</div><div class="card"><label>年間の生活費（円）</label><input id="p_fexp" type="number" inputmode="numeric" value="'+Math.round(annual)+'"><button class="btn sm mt" onclick="updateFire()">計算</button><div class="sub mt">必要資産の目安（年間支出×25）：<b style="color:var(--primary)">'+yen(fireTarget)+'</b><br>'+(annual>0?('今の資産・積立・利回りのままなら、約 <b>'+(ytf!=null?ytf+"年":"—")+'</b> で到達見込み'):'年間の生活費を入れると計算します')+'</div><div class="muted mt">※「4%ルール」に基づく概算です。税・インフレ等で変わります。</div></div>';

  // ⑤ 資産の推移（自動）
  const nw=yearlyNetWorth();
  h+='<div class="datehead">⑤ 資産の推移（家計簿から自動）</div><div class="card">';
  if(nw.length){ h+=barSVG(nw.map(a=>({label:a.year+"",value:a.net})))+nw.map(a=>'<div class="txrow"><div><b>'+a.year+'年末</b><div class="txmeta">貯金'+yen(a.cash)+' ＋ 投資'+yen(a.inv)+'</div></div><span class="amt">'+yen(a.net)+'</span></div>').join("")+'<div class="muted mt">記録した収入・支出・投資から、年末ごとの純資産を自動計算しています。手入力は不要です。</div>'; }
  else h+='<div class="muted center">収入・支出を記録すると、年ごとの資産推移が自動で出ます</div>';
  h+='</div>'; return h;
}

let _toastTimer=null, _toastHide=null;
window.showToast=function(msg){
  const box=document.getElementById("toast"); if(!box)return;
  if(_toastTimer)clearTimeout(_toastTimer); if(_toastHide)clearTimeout(_toastHide);
  const check='<span class="tk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>';
  box.innerHTML='<div class="toast">'+check+'<span>'+esc(msg||"完了しました")+'</span></div>';
  const el=box.firstChild;
  requestAnimationFrame(function(){ if(el)el.classList.add("show"); });
  _toastHide=setTimeout(function(){ if(el)el.classList.remove("show"); },1600);
  _toastTimer=setTimeout(function(){ box.innerHTML=""; },1850);
};

let calcExpr="";
window.openCalc=function(){ calcExpr=""; const m=document.getElementById("modal");
  const keys=["7","8","9","÷","4","5","6","×","1","2","3","-","0",".","⌫","+"];
  m.innerHTML='<div class="overlay"><div class="modal"><div class="calc-disp" id="_cd">0</div><div class="calc-grid">'
    +keys.map(k=>'<button class="'+("÷×-+".includes(k)?"op":"")+'" onclick="calcKey(\''+k+'\')">'+k+'</button>').join("")
    +'<button onclick="calcKey(\'C\')">C</button><button class="eq" onclick="calcKey(\'=\')">=</button><button class="op" onclick="calcApply()">適用</button><button class="cancel" style="border:1px solid var(--border);border-radius:12px" onclick="closeModal()">閉じる</button>'
    +'</div></div></div>'; };
window.calcKey=function(k){ if(k==="C")calcExpr=""; else if(k==="⌫")calcExpr=calcExpr.slice(0,-1); else if(k==="=")calcExpr=String(evalExpr(calcExpr)); else calcExpr+=k; const d=document.getElementById("_cd"); if(d)d.textContent=calcExpr||"0"; };
window.calcApply=function(){ const v=evalExpr(calcExpr); const a=document.getElementById("f_amount"); if(a&&v!=null&&isFinite(v))a.value=Math.round(v); closeModal(); };
function evalExpr(s){ if(!s)return 0; const c=String(s).replace(/×/g,"*").replace(/÷/g,"/"); if(!/^[0-9+\-*/.() ]+$/.test(c))return 0; try{ const r=Function('"use strict";return('+c+')')(); return isFinite(r)?r:0; }catch(e){ return 0; } }

/* ---------- レシート解析 ---------- */
function normalize(s){ return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/，/g,",").replace(/　/g," "); }
function cleanNum(s){ if(!s)return null; const n=parseInt(String(s).replace(/[,\s]/g,""),10); return Number.isFinite(n)?n:null; }
const AMOUNT_RE=/([0-9][0-9,]*)\s*円|[¥￥]\s*([0-9][0-9,]*)/gi;
const KW=["合計","お会計","total","ご利用金額","利用金額","お支払","請求","税込"];
const EXCL=/預|釣|おつり|ポイント|point|残高|チャージ/i;
function numsIn(s){ return [...s.matchAll(AMOUNT_RE)].map(m=>cleanNum(m[1]||m[2])).filter(n=>n); }
function hasKW(l){ const x=l.toLowerCase(); return KW.some(k=>x.includes(k.toLowerCase())); }
function extractAmount(text){ const L=normalize(text).split(/\r?\n/); let best=null;
  for(const line of L){ if(EXCL.test(line)||!hasKW(line))continue; for(const n of numsIn(line))if(best===null||n>best)best=n; } if(best!==null)return best;
  for(let i=0;i<L.length;i++){ if(!hasKW(L[i]))continue; const nx=L[i+1]||""; if(EXCL.test(nx))continue; for(const n of numsIn(nx))if(best===null||n>best)best=n; } if(best!==null)return best;
  const all=[]; for(const line of L){ if(EXCL.test(line))continue; all.push(...numsIn(line)); } return all.length?Math.max(...all):null; }
function extractDate(text){ const t=normalize(text); const P=[/(\d{4})[年\/\-.](\d{1,2})[月\/\-.](\d{1,2})/,/(\d{2})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/];
  for(const re of P){ const m=t.match(re); if(m){ let y=m[1]; if(y.length===2)y="20"+y; const mm=pad(m[2]),dd=pad(m[3]); if(+mm>=1&&+mm<=12&&+dd>=1&&+dd<=31)return y+"-"+mm+"-"+dd; } } return null; }
function extractPayee(lines){ for(const line of lines.slice(0,5)){ const c=line.trim(); if(!c)continue; if(/[0-9]{3,}/.test(c))continue; if(/円|¥|￥|合計|tel|電話|領収|レシート/i.test(c))continue; if(c.length>=2&&c.length<=30)return c; } return lines[0]||null; }
function parseReceiptText(text){ if(!text)return{amount:null,date:null,payee:null}; const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean); return {amount:extractAmount(text),date:extractDate(text),payee:extractPayee(lines)}; }
