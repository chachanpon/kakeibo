    <title>かんたん家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
      :root {
        --primary: #4f9a86;
        --primary-l: #e6f1ed;
        --accent: #e0956a;
        --income: #5b8fcb;
        --expense: #d07a5f;
        --medical: #c07ca8;
        --invest: #6e8fc7;
        --bg: #f6f3ec;
        --card: #fffdf9;
        --border: #e8e2d6;
        --text: #3b3a34;
        --sub: #7c776c;
        --light: #ada79a;
        --warn: #d9863f;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        font-family: "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Yu Gothic UI", "YuGothic", "Meiryo", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        font-size: 15px;
      }
      #app {
        max-width: 520px;
        margin: 0 auto;
        padding: 14px 14px calc(88px + env(safe-area-inset-bottom));
      }
      h2 {
        font-size: 19px;
        margin: 4px 0 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      /* 見出しはメリハリ重視：丸ゴシックでも埋もれないよう太字＋字間を少し広げる */
      h1, h2, h3, .datehead, nav button.on {
        font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .datehead {
        letter-spacing: 0.03em;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .card.tint {
        background: var(--primary-l);
        border-color: #d6e7e0;
      }
      .ic {
        display: inline-flex;
        vertical-align: -2px;
      }
      .row {
        display: flex;
        align-items: center;
      }
      .between {
        justify-content: space-between;
      }
      .muted {
        color: var(--light);
        font-size: 13px;
      }
      .sub {
        color: var(--sub);
        font-size: 13px;
      }
      label {
        display: block;
        font-size: 13px;
        color: var(--sub);
        font-weight: 600;
        margin: 12px 0 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 16px;
        background: #fff;
        color: var(--text);
        font-family: inherit;
      }
      input[type="date"],
      input[type="datetime-local"] {
        -webkit-appearance: none;
        appearance: none;
        max-width: 100%;
        min-width: 0;
        display: block;
      }
      input[type="date"]::-webkit-date-and-time-value {
        text-align: left;
      }
      /* 日付入力欄をアプリのトーンに合わせて柔らかく */
      input[type="date"] {
        background: var(--primary-l);
        border-color: #cfe6dc;
        color: var(--text);
        font-weight: 700;
        border-radius: 12px;
      }
      input[type="date"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        padding: 4px;
        border-radius: 8px;
        /* カレンダーアイコンをアプリのプライマリ色に着色 */
        filter: invert(52%) sepia(18%) saturate(760%) hue-rotate(112deg) brightness(92%) contrast(88%);
        opacity: 0.9;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover {
        background: rgba(79,154,134,0.14);
      }
      textarea {
        height: 70px;
        resize: vertical;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      .btn {
        display: block;
        width: 100%;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 16px;
        font-weight: 700;
        margin-top: 6px;
      }
      .btn.ghost {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
      }
      .btn.sm {
        padding: 10px;
        font-size: 14px;
      }
      .seg {
        display: flex;
        background: var(--primary-l);
        border-radius: 12px;
        padding: 4px;
        margin: 4px 0;
      }
      .seg button {
        flex: 1;
        border: none;
        background: transparent;
        padding: 10px;
        border-radius: 9px;
        color: var(--sub);
        font-size: 14px;
      }
      .seg button.on {
        background: var(--primary);
        color: #fff;
        font-weight: 700;
      }
      .seg.exp button.on {
        background: var(--expense);
      }
      .seg.inc button.on {
        background: var(--income);
      }
      .csv-seg {
        margin-bottom: 12px;
      }
      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #fff;
        color: var(--sub);
        font-size: 14px;
      }
      .chip.on {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }
      .ledgers {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 6px 0 10px;
      }
      .ltab {
        white-space: nowrap;
        padding: 8px 15px;
        border-radius: 999px;
        border: 1.5px solid var(--primary);
        background: #fff;
        color: var(--text);
        font-size: 14px;
      }
      .ltab.on {
        background: var(--primary);
        color: #fff;
        font-weight: 700;
      }
      .txrow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .txrow:last-child {
        border-bottom: none;
      }
      .txrow.tap {
        cursor: pointer;
      }
      .txrow.tap:active {
        background: var(--primary-l);
      }
      .editbar {
        background: #fdf3e8;
        border: 1px solid var(--accent);
        color: #8a5a2b;
        border-radius: 12px;
        padding: 10px 12px;
        margin-bottom: 10px;
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .editbar button {
        background: none;
        border: none;
        color: var(--expense);
        font-weight: 700;
        font-size: 13px;
      }
      .txcat {
        font-weight: 600;
      }
      .txmeta {
        font-size: 12px;
        color: var(--light);
        margin-top: 2px;
      }
      .amt {
        font-weight: 700;
        font-size: 16px;
      }
      .bar {
        height: 10px;
        background: var(--primary-l);
        border-radius: 5px;
        overflow: hidden;
      }
      .bar > span {
        display: block;
        height: 100%;
        background: var(--expense);
        border-radius: 5px;
      }
      .del {
        color: var(--expense);
        font-size: 13px;
        background: none;
        border: none;
        padding: 4px 8px;
      }
      .stat {
        width: 33.33%;
        padding: 6px 0;
      }
      .stat .l {
        font-size: 12px;
        color: var(--sub);
      }
      .stat .v {
        font-size: 16px;
        font-weight: 800;
        margin-top: 2px;
      }
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 7px 0;
      }
      .switch {
        position: relative;
        width: 46px;
        height: 28px;
        flex: none;
      }
      .switch input {
        display: none;
      }
      .switch .track {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 999px;
        transition: 0.2s;
      }
      .switch .track:before {
        content: "";
        position: absolute;
        width: 22px;
        height: 22px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s;
      }
      .switch input:checked + .track {
        background: var(--primary);
      }
      .switch input:checked + .track:before {
        transform: translateX(18px);
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
      }
      .wdrow {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        margin-bottom: 6px;
      }
      .wd {
        text-align: center;
        font-size: 12px;
        color: var(--sub);
        font-weight: 600;
        padding: 2px 0;
      }
      .wd.sun {
        color: var(--expense);
      }
      .wd.sat {
        color: var(--income);
      }
      .calwrap {
        background: var(--border);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }
      .cal {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 1px;
      }
      .cell {
        background: #fff;
        min-height: 56px;
        padding: 3px 1px 2px;
        text-align: center;
        border: none;
      }
      .cell.sel {
        background: var(--primary-l);
      }
      .cell .d {
        font-size: 13px;
      }
      .cell .d.sun {
        color: var(--expense);
      }
      .cell .d.sat {
        color: var(--income);
      }
      .cell .today {
        display: inline-block;
        min-width: 20px;
        line-height: 20px;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        font-weight: 800;
      }
      .cell .ci {
        font-size: 9px;
        color: var(--income);
        line-height: 1.15;
        overflow: hidden;
      }
      .cell .ce {
        font-size: 9px;
        color: var(--expense);
        line-height: 1.15;
        overflow: hidden;
      }
      .mnav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .mnav button {
        background: none;
        border: none;
        font-size: 26px;
        color: var(--primary);
        padding: 2px 16px;
      }
      .mtitle {
        font-size: 20px;
        font-weight: 800;
      }
      .datehead {
        font-size: 13px;
        font-weight: 700;
        color: var(--sub);
        margin: 14px 0 4px;
      }
      .csv-sub {
        font-size: 14px;
        font-weight: 800;
        color: var(--text);
        margin: 2px 0 6px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }
      .center {
        text-align: center;
      }
      .mt {
        margin-top: 12px;
      }
      .legend {
        display: flex;
        justify-content: center;
        gap: 18px;
        margin-top: 8px;
        font-size: 12px;
      }
      .catman {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 8px;
      }
      .catpill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px 6px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 14px;
      }
      .catpill button {
        background: none;
        border: none;
        color: var(--light);
        font-size: 15px;
        line-height: 1;
        padding: 0 2px;
      } /* 並び替え（ドラッグ） */
      .dragrow {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 4px;
        border-bottom: 1px solid var(--border);
        background: var(--card);
        touch-action: pan-y;
      }
      .draghandle,
      .dragrow .dragmain,
      .dragghost {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      .dragrow:last-of-type {
        border-bottom: none;
      }
      .dragrow.dragging {
        opacity: 0.4;
      }
      .dragrow.dragover {
        border-top: 2px solid var(--primary);
      }
      .draghandle {
        flex: none;
        width: 30px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--light);
        cursor: grab;
        touch-action: none;
        border-radius: 8px;
      }
      .draghandle:active {
        cursor: grabbing;
        background: var(--primary-l);
      }
      .draghandle.holding {
        background: var(--primary);
        color: #fff;
        transform: scale(1.08);
      }
      .draghandle svg {
        width: 18px;
        height: 18px;
      }
      .dragmain {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        overflow: hidden;
      }
      .dragmain .nm {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .dragrow .acts {
        flex: none;
        display: flex;
        gap: 2px;
      }
      .dragghost {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 200;
        pointer-events: none;
        background: var(--card);
        border: 1px solid var(--primary);
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        padding: 9px 12px;
        opacity: 0.96;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .catman.drag {
        flex-direction: column;
        align-items: stretch;
        gap: 0;
      }
      .ocrbox {
        border: 1px dashed var(--primary);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        background: var(--primary-l);

      .ocrbox input {
        display: none;
      }
      .ocrlabel {
        color: var(--primary);

        left: 0;
        right: 0;

        padding-top: 6px;

        color: var(--primary);

      .modal {
        background: #fff;

      .modal h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      .modal-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-weight: 700;
        font-size: 15px;

        background: var(--primary);

      }
      .modal-actions .cancel {
        background: var(--bg);

      .calc-disp {
        background: var(--bg);

        padding: 14px;
        text-align: right;
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 10px;
        min-height: 28px;
        word-break: break-all;
      }
      .calc-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);

        padding: 15px 0;

        border-radius: 12px;
        background: #fff;
        font-size: 18px;
        font-weight: 700;
      }
      .calc-grid button.op {
        background: var(--primary-l);
        color: var(--primary);
      }
      .calc-grid button.eq {
        background: var(--primary);
        color: #fff;
      }
      .flash {
        background: var(--primary);
        color: #fff;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 12px;
      }
      #toast {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 100;
      }
      #toast .toast {
        background: rgba(35, 44, 40, 0.94);
        color: #fff;
        border-radius: 16px;
        padding: 16px 22px;
        font-weight: 700;
        font-size: 15px;
        max-width: 78%;
        text-align: center;
        display: flex;
        align-items: center;
        gap: 9px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        opacity: 0;
        transform: scale(0.9);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }
      #toast .toast.show {
        opacity: 1;
        transform: scale(1);
      }
      #toast .toast .tk {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: none;
      }
      #toast .toast .tk svg {
        width: 15px;
        height: 15px;
      }
      .calcbtn {

        flex: none;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #fff;
        font-size: 20px;

      .fpgroup {
        border-top: 1px solid var(--border);
        margin-top: 10px;
        padding-top: 10px;
      }
      .stackbar {
        display: flex;
        height: 30px;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 10px;
        background: var(--bg);
      }
      .stackseg {
        height: 100%;

        transition: opacity 0.15s;
        min-width: 2px;

      .stackseg:active {
        opacity: 0.55;

      .sliceinfo {
        font-size: 13px;

        min-height: 22px;
        display: flex;
        align-items: center;
        gap: 6px;
        opacity: 0.85;
      }
      .slicelegend {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        margin-top: 12px;
      }
      .slicechip {
        font-size: 12px;
        color: var(--sub);
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 3px;
        flex: none;
      }
      .bignum {
        font-size: 24px;
        font-weight: 800;
        color: var(--primary);
      }
      .ef-good {
        color: var(--income);
      }
      .ef-warn {
        color: var(--accent);
      }
      .ef-bad {
        color: var(--expense);

      input[type="number"]{-moz-appearance:textfield;appearance:textfield;}
      input[type="number"]::-webkit-outer-spin-button,
      input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;appearance:none;margin:0;}
      /* カテゴリ管理の開閉見出し */

      .grp-tabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
      .grp-tabs button{border:1px solid var(--border);background:#fff;color:var(--sub);border-radius:999px;padding:7px 14px;font-size:13.5px;white-space:nowrap;font-weight:600;cursor:pointer}

      .count-row{display:flex;align-items:center;gap:10px;margin:6px 0 4px}

      .cnum{font-size:20px;font-weight:800;min-width:40px;text-align:center}
      .cunit{color:var(--sub);font-size:13px}
      .stk-memo{background:#f7f5ef;border-radius:10px;padding:9px 11px;margin-top:8px;font-size:12.5px}
      .stk-memo .lo{color:var(--primary);font-weight:700}
      .stk-item details summary{font-size:12px;color:var(--sub);cursor:pointer;margin-top:6px;list-style:none}
      .stk-item details summary::-webkit-details-marker{display:none}
      .stk-item details[open] summary{color:var(--primary)}

      .grp-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border)}
      .grp-row:first-child{border-top:none}
      .grp-row .gn{flex:1;font-weight:600}
      .grp-row .gdel{color:var(--primary);background:none;border:none;font-size:13px;font-weight:700;cursor:pointer}
      .grp-row .gdel.rm{color:var(--expense)}
      .stk-seg{display:flex;background:var(--primary-l);border-radius:12px;padding:4px;margin:4px 0}

      .rep-qty{width:64px;padding:7px;border:1px solid var(--border);border-radius:8px;text-align:center;font-size:14px}
      .home-buy{background:#fff4ea;border:1px solid #f2d9bf;display:flex;align-items:center;gap:10px;cursor:pointer}

window.exportWithData=function(){ try{  const seed='<scr'+'ipt>window.__SEED__='+JSON.stringify(data).replace(/</g,"\\u003c")+';</scr'+'ipt>';  let html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;  html=html.replace(/<body[^>]*>/, function(m){ return m+'\n'+seed; }); html=html.replace(/<link rel="manifest"[^>]*>/g,"");  const blob=new Blob([html],{type:"text/html;charset=utf-8"});  const url=URL.createObjectURL(blob); const a=document.createElement("a");  a.href=url; a.download="かんたん家計簿（データ入り）.html"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);}catch(e){ alert("書き出しに失敗しました: "+(e&&e.message||e)); } };/* ---------- レシート解析 ---------- */function normalize(s){ return s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/，/g,",").replace(/　/g," "); }function cleanNum(s){ if(!s)return null; const n=parseInt(String(s).replace(/[,\s]/g,""),10); return Number.isFinite(n)?n:null; }const AMOUNT_RE=/([0-9][0-9,]*)\s*円|[¥￥]\s*([0-9][0-9,]*)/gi;const KW=["合計","お会計","total","ご利用金額","利用金額","お支払","請求","税込"];const EXCL=/預|釣|おつり|ポイント|point|残高|チャージ/i;function numsIn(s){ return [...s.matchAll(AMOUNT_RE)].map(m=>cleanNum(m[1]||m[2])).filter(n=>n); }function hasKW(l){ const x=l.toLowerCase(); return KW.some(k=>x.includes(k.toLowerCase())); }function extractAmount(text){ const L=normalize(text).split(/\r?\n/); let best=null;  for(const line of L){ if(EXCL.test(line)||!hasKW(line))continue; for(const n of numsIn(line))if(best===null||n>best)best=n; } if(best!==null)return best;  for(let i=0;i<L.length;i++){ if(!hasKW(L[i]))continue; const nx=L[i+1]||""; if(EXCL.test(nx))continue; for(const n of numsIn(nx))if(best===null||n>best)best=n; } if(best!==null)return best;  const all=[]; for(const line of L){ if(EXCL.test(line))continue; all.push(...numsIn(line)); } return all.length?Math.max(...all):null; }function extractDate(text){ const t=normalize(text); const P=[/(\d{4})[年\/\-.](\d{1,2})[月\/\-.](\d{1,2})/,/(\d{2})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/];  for(const re of P){ const m=t.match(re); if(m){ let y=m[1]; if(y.length===2)y="20"+y; const mm=pad(m[2]),dd=pad(m[3]); if(+mm>=1&&+mm<=12&&+dd>=1&&+dd<=31)return y+"-"+mm+"-"+dd; } } return null; }function extractPayee(lines){ for(const line of lines.slice(0,5)){ const c=line.trim(); if(!c)continue; if(/[0-9]{3,}/.test(c))continue; if(/円|¥|￥|合計|tel|電話|領収|レシート/i.test(c))continue; if(c.length>=2&&c.length<=30)return c; } return lines[0]||null; }function parseReceiptText(text){ if(!text)return{amount:null,date:null,payee:null}; const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean); return {amount:extractAmount(text),date:extractDate(text),payee:extractPayee(lines)}; }

  h+='<label>管理のしかた</label><div class="stk-seg" id="stk-ni-mode"><button class="'+(ui.niMode==="rough"?"on":"")+'" onclick="stkNiMode(\'rough\')">ざっくり</button><button class="'+(ui.niMode==="count"?"on":"")+'" onclick="stkNiMode(\'count\')">個数</button></div>';
  if(ui.niMode==="rough"){
    h+='<label>知らせるライン</label><div class="stk-seg"><button class="'+(ui.niThresh===1?"on":"")+'" onclick="stkNiThresh(1)">①切らしたら</button><button class="'+(ui.niThresh===2?"on":"")+'" onclick="stkNiThresh(2)">②半分以下</button></div>';
  } else {
    h+='<label>知らせるライン（残り○個以下）</label><input id="stk-ni-thc" type="number" inputmode="numeric" value="2" style="margin-bottom:8px">';
    h+='<label>単位（任意・例：ロール／袋）</label><input id="stk-ni-unit" placeholder="" style="margin-bottom:8px">';
  }
  // 紐づける家計簿カテゴリ（グループ単位・その場で変更）
  var curGrpForLink = (ui.niGrp && ui.niGrp!=="__new__") ? ui.niGrp : (stkGroups()[0]||"");
  var linkList = (data.stock.catLinks && data.stock.catLinks[curGrpForLink]) || [];
  h+='<label>紐づける家計簿カテゴリ</label>';
  h+='<div class="grp-row" style="border-top:none;padding-top:0"><span class="muted" style="flex:1">'+(ui.niGrp==="__new__"?'（グループを作成すると設定できます）':(linkList.length?linkList.map(esc).join("・"):"（未設定）"))+'</span>'+((ui.niGrp&&ui.niGrp!=="__new__")?'<button class="gdel" onclick="stkEditCatLink('+JSON.stringify(curGrpForLink).replace(/"/g,'&quot;')+')">変更</button>':'')+'</div>';
  h+='<div class="muted" style="margin:2px 0 8px">この「'+esc(curGrpForLink||"")+'」グループの品目は、入力でこのカテゴリを選んだとき補充候補に出ます（グループ全体で共通）。</div>';
  h+='<label>底値メモ（任意）</label><input id="stk-ni-memo" placeholder="例：◯◯ドラッグで598円" style="margin-bottom:8px">';
  h+='<label>購入リンク URL（任意）</label><input id="stk-ni-url" placeholder="https://..." style="margin-bottom:8px">';
  if(editing){
    h+='<div style="display:flex;gap:8px;margin-top:6px"><button class="btn ghost" style="flex:1" onclick="stkCancelEdit()">キャンセル</button><button class="btn" style="flex:1" onclick="stkAddItem()">更新する</button></div>';
  } else {
    h+='<button class="btn mt" onclick="stkAddItem()">追加する</button>';
  }
  h+='</div>';

  // グループの追加・編集（品目追加の下・▼で開閉）
  h+='<div class="stk-datehead">グループの追加・編集</div>';
  h+='<div class="card"><div class="cat-head" onclick="stkToggleGrpEdit()"><span class="sub" style="font-weight:700">グループの追加・名前変更・削除</span><span class="cat-toggle">'+stkGroups().length+'グループ <span class="cat-caret'+(ui.grpEditOpen?" open":"")+'">▼</span></span></div>';
  if(ui.grpEditOpen){
    h+=stkGroups().map(function(g,i){
        var n=data.stock.items.filter(function(it){return it.grp===g;}).length;
        return '<div class="grp-row"><span class="gn">'+esc(g)+'</span><span class="muted">'+n+'品目</span><button class="gdel" onclick="stkRenameGroup('+i+')">名前変更</button><button class="gdel rm" onclick="stkRemoveGroup('+i+')">削除</button></div>';
      }).join("");
    h+='<div style="display:flex;gap:8px;margin-top:10px"><input id="stk-new-grp" placeholder="新しいグループ名"><button class="btn sm" style="width:auto;padding:9px 16px" onclick="stkAddGroup()">追加</button></div>';
    h+='<div class="muted mt">名前を変えると、その品目のグループ表示もまとめて変わります（今まで入力した品目はそのまま新しい名前に付け替わります）。削除すると、そのグループの品目は「未分類」になります。</div>';
    h+='<div class="stk-datehead" style="margin-top:14px">家計簿カテゴリとの紐づけ</div>';
    h+='<div class="muted" style="margin-bottom:8px">在庫グループに家計簿の支出カテゴリを紐づけると、入力時にそのカテゴリを選んだとき補充候補が出ます。</div>';
    h+=stkGroups().map(function(g){
        var links=(data.stock.catLinks&&data.stock.catLinks[g])||[];
        return '<div class="grp-row"><span class="gn">'+esc(g)+'</span><span class="muted" style="flex:2">'+(links.length?links.map(esc).join("・"):"（未設定）")+'</span><button class="gdel" onclick="stkEditCatLink('+JSON.stringify(g).replace(/"/g,'&quot;')+')">変更</button></div>';
      }).join("");
  }
  h+='</div>';
  return h;
}
/* ---------- 在庫 操作 ---------- */
window.stkSetTab=function(g){ ui.stockTab=g; render(); };
window.toggleCatList=function(kind){ if(kind==="expense") ui.catExpOpen=!ui.catExpOpen; else ui.catIncOpen=!ui.catIncOpen; render(); };
window.stkSetLevel=function(id,n){ var it=stkFind(id); if(!it)return; it.level=n; save(); render(); };
window.stkChgCount=function(id,d){ var it=stkFind(id); if(!it)return; it.count=Math.max(0,it.count+d); save(); render(); };
window.stkToggleGrpEdit=function(){ ui.grpEditOpen=!ui.grpEditOpen; render(); };
window.stkNiMode=function(m){ _snapshotNiInputs(); ui.niMode=m; render(); _restoreNiInputs(); };
function _snapshotNiInputs(){
  var n=document.getElementById("stk-ni-name"); if(n) ui._niName=n.value;
  var ng=document.getElementById("stk-ni-newgrp"); if(ng) ui._niNewGrp=ng.value;
  var mm=document.getElementById("stk-ni-memo"); if(mm) ui._niMemo=mm.value;
  var uu=document.getElementById("stk-ni-url"); if(uu) ui._niUrl=uu.value;
  var un=document.getElementById("stk-ni-unit"); if(un) ui._niUnit=un.value;
  var tc=document.getElementById("stk-ni-thc"); if(tc) ui._niThc=tc.value;
}
function _restoreNiInputs(){
  var n=document.getElementById("stk-ni-name"); if(n&&ui._niName!=null) n.value=ui._niName;
  var ng=document.getElementById("stk-ni-newgrp"); if(ng&&ui._niNewGrp!=null) ng.value=ui._niNewGrp;
  var mm=document.getElementById("stk-ni-memo"); if(mm&&ui._niMemo!=null) mm.value=ui._niMemo;
  var uu=document.getElementById("stk-ni-url"); if(uu&&ui._niUrl!=null) uu.value=ui._niUrl;
  var un=document.getElementById("stk-ni-unit"); if(un&&ui._niUnit!=null) un.value=ui._niUnit;
  var tc=document.getElementById("stk-ni-thc"); if(tc&&ui._niThc!=null) tc.value=ui._niThc;
}
window.stkNiThresh=function(n){ _snapshotNiInputs(); ui.niThresh=n; render(); _restoreNiInputs(); };
/* 補充（家計簿と切り離した在庫だけの補充）: 前回購入日を更新 */
function stkReplenish(it,addCount){
  var today=new Date(); var lbl=(today.getMonth()+1)+"/"+today.getDate();
  if(it.mode==="rough"){ it.level=3; }
  else { if(addCount==null||addCount<=0){ it.count=it.max||Math.max(it.count,6); } else { it.count=it.count+addCount; if(!it.max||it.count>it.max) it.max=it.count; } }
  it.last=lbl+"（購入）"; it.lastAt=todayStr();
}
window.stkBought=function(id){
  var it=stkFind(id); if(!it)return;
  var g=data.stock.boughtGuard||{}; var now=Date.now();
  if(g[id]&&now-g[id]<1500) return; g[id]=now; data.stock.boughtGuard=g;
  if(it.mode==="rough"){ stkReplenish(it); showToast(it.name+' を"たっぷり"に戻しました'); }
  else { var before=it.count; stkReplenish(it); showToast(it.name+' を補充しました（残り'+it.count+it.unit+'）'); }
  save(); render();
};
window.stkAddGroup=function(){ var v=(val("stk-new-grp")||"").trim(); if(!v)return; if(stkGroups().indexOf(v)<0) stkGroups().push(v); if(!data.stock.catLinks[v]) data.stock.catLinks[v]=[]; save(); render(); showToast("「"+v+"」を追加しました"); };
window.stkRenameGroup=function(i){ var old=stkGroups()[i]; showTextPrompt("新しいグループ名",old,function(v){ if(!v)return; stkGroups()[i]=v; data.stock.items.forEach(function(it){ if(it.grp===old)it.grp=v; }); if(data.stock.catLinks[old]){ data.stock.catLinks[v]=data.stock.catLinks[old]; delete data.stock.catLinks[old]; } if(ui.stockTab===old)ui.stockTab=v; save(); render(); showToast("名前を変更しました"); }); };
window.stkRemoveGroup=function(i){ var g=stkGroups()[i]; showConfirm("「"+g+"」を削除しますか？（この中の品目は「未分類」になります）",function(){ stkGroups().splice(i,1); data.stock.items.forEach(function(it){ if(it.grp===g)it.grp="未分類"; }); delete data.stock.catLinks[g]; if(ui.stockTab===g)ui.stockTab="すべて"; save(); render(); showToast("削除しました"); }); };
window.stkEditCatLink=function(g){
  var cur=((data.stock.catLinks&&data.stock.catLinks[g])||[]).join("、");
  showTextPrompt("「"+g+"」に紐づける家計簿カテゴリ（複数は「、」区切り）",cur,function(v){
    var arr=(v||"").split(/[、,]/).map(function(s){return s.trim();}).filter(Boolean);
    if(!data.stock.catLinks) data.stock.catLinks={}; data.stock.catLinks[g]=arr;
    save(); render(); showToast("紐づけを更新しました");
  });
};
window.stkNiGrpChange=function(sel){ _snapshotNiInputs(); ui.niGrp=sel.value; render(); _restoreNiInputs(); };
window.stkAddItem=function(){
  var name=(val("stk-ni-name")||"").trim(); if(!name){ alert("品目名を入れてください"); return; }
  var grp;
  var selEl=document.getElementById("stk-ni-grp");
  if(selEl && selEl.value==="__new__"){
    grp=(val("stk-ni-newgrp")||"").trim();
    if(!grp){ alert("新しいグループ名を入れてください"); return; }
    if(stkGroups().indexOf(grp)<0){ stkGroups().push(grp); if(!data.stock.catLinks[grp]) data.stock.catLinks[grp]=[]; }
  } else {
    grp=(selEl?selEl.value:"")||stkGroups()[0]||"未分類";
  }
  var memo=(val("stk-ni-memo")||"").trim();
  var url=(val("stk-ni-url")||"").trim();
  var editing = ui.stEditId!=null;
  var it = editing ? stkFind(ui.stEditId) : {id:stockNextId(),last:"—",lastAt:null};
  if(!it){ ui.stEditId=null; editing=false; it={id:stockNextId(),last:"—",lastAt:null}; }
  it.name=name; it.grp=grp; it.mode=ui.niMode; it.memo=memo; it.url=url;
  if(ui.niMode==="rough"){
    it.threshRough = (ui.niThresh||2);
    if(it.level==null) it.level=3;               // 新規/モード変更時のみ既定
    // 個数専用フィールドは残っていても無害だが整理
  } else {
    it.threshCount = intval("stk-ni-thc")||2;
    it.unit=(val("stk-ni-unit")||"").trim();
    if(it.count==null) it.count=0;
    if(it.max==null) it.max=6;
  }
  if(!editing){ data.stock.items.push(it); }
  var wasEditing=editing;
  ui.stEditId=null; ui.niGrp=grp;
  ui._niName=""; ui._niNewGrp=""; ui._niMemo=""; ui._niUrl=""; ui._niUnit=""; ui._niThc="";
  save(); render();
  showToast(wasEditing ? "「"+name+"」を更新しました" : "「"+name+"」を追加しました");
};
window.stkCancelEdit=function(){ ui.stEditId=null; ui._niName=""; ui._niNewGrp=""; ui._niMemo=""; ui._niUrl=""; ui._niUnit=""; ui._niThc=""; render(); };
window.stkEditItem=function(id){
  var it=stkFind(id); if(!it)return;
  ui.stEditId=id;
  ui.niMode=it.mode||"rough";
  ui.niThresh=(it.mode==="rough")?(it.threshRough||2):2;
  ui.niGrp=it.grp;
  ui._niName=it.name||"";
  ui._niNewGrp="";
  ui._niMemo=it.memo||"";
  ui._niUrl=it.url||"";
  ui._niUnit=it.unit||"";
  ui._niThc=(it.mode==="count")?String(it.threshCount||2):"";
  render();
  _restoreNiInputs();
  // フォームまでスクロール
  var nameEl=document.getElementById("stk-ni-name");
  if(nameEl){ nameEl.scrollIntoView({behavior:"smooth",block:"center"}); }
};
window.stkDeleteItem=function(id){ var it=stkFind(id); if(!it)return; showConfirm("「"+it.name+"」を削除しますか？",function(){ data.stock.items=data.stock.items.filter(function(x){return x.id!==id;}); save(); render(); showToast("削除しました"); }); };
/* ---------- 入力タブ 補充連動 ---------- */
function refreshReplenishBox(){ var box=document.getElementById("replenish-box"); if(!box) return; var cat=box.getAttribute("data-cat")||""; box.innerHTML=replenishCardHTML(cat); }
window.toggleReplenish=function(id){ ui.replenishSel[id]=!ui.replenishSel[id]; var it=stkFind(id);
  if(ui.replenishSel[id]&&it&&it.mode==="count"&&(ui.replenishQty[id]==null)){ ui.replenishQty[id]=it.max||1; }
  refreshReplenishBox(); };
window.setReplenishQty=function(id,v){ ui.replenishQty[id]=Math.max(0,parseInt(v,10)||0); };
/* saveTx から呼ばれる：選択済みの補充を適用してトースト文言を返す */
function applyReplenishOnSave(){
  var ids=Object.keys(ui.replenishSel).filter(function(k){return ui.replenishSel[k];}).map(function(k){return parseInt(k,10);});
  if(!ids.length) return null;
  var names=[];
  ids.forEach(function(id){ var it=stkFind(id); if(!it)return;
    if(it.mode==="rough"){ stkReplenish(it); names.push(it.name+'（たっぷり）'); }
    else { var qEl=document.getElementById("rep_qty_"+id); var q=qEl?(parseInt(qEl.value,10)||0):(ui.replenishQty[id]||0); if(q<=0)q=it.max||1; stkReplenish(it,q); names.push(it.name+'＋'+q); }
  });
  ui.replenishSel={}; ui.replenishQty={};
  if(names.length===1) return names[0].indexOf('（たっぷり）')>=0 ? names[0].replace('（たっぷり）',' を"たっぷり"に戻しました') : names[0].replace(/＋(\d+)$/,' を＋$1しました');
  return names.length+"品目の在庫を補充しました（"+names.join("・")+"）";
}
/* 補充カードのHTML（カテゴリに紐づく在庫品目がある時だけ表示） */
function replenishCardHTML(cat){
  var its=stkItemsForCategory(cat);
  if(!its.length) return "";
  var h='<div class="card replenish-card mt"><div style="font-weight:700;margin-bottom:2px">🛒 在庫を補充する？</div><div class="muted" style="margin-bottom:6px">このカテゴリで買ったものを選ぶと、保存時にまとめて在庫を補充します（任意）。</div>';
  h+=its.map(function(it){
    var on=!!ui.replenishSel[it.id];
    var chk='<span class="rep-check'+(on?" on":"")+'" onclick="toggleReplenish('+it.id+')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>';
    var right='';
    if(it.mode==="count"){ var q=(ui.replenishQty[it.id]!=null)?ui.replenishQty[it.id]:(it.max||1); right=on?('<input id="rep_qty_'+it.id+'" class="rep-qty" type="number" inputmode="numeric" value="'+q+'" onchange="setReplenishQty('+it.id+',this.value)"> <span class="cunit">'+esc(it.unit||"個")+'</span>'):('<span class="muted">個数</span>'); }
    else { right='<span class="muted">'+esc(stkStatusLabel(it))+'</span>'; }
    return '<div class="rep-item">'+chk+'<span class="rep-name">'+esc(it.name)+'</span>'+right+'</div>';
  }).join("");
  h+='</div>';
  return h;
}

render(); checkBackupReminder();
